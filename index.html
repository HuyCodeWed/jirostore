<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIRO BOOSTING VALORANT</title>
    
    <!-- Favicon (Icon trên tab trình duyệt) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ff4655'/><circle cx='50' cy='50' r='25' fill='none' stroke='white' stroke-width='8'/><line x1='50' y1='15' x2='50' y2='85' stroke='white' stroke-width='8'/><line x1='15' y1='50' x2='85' y2='50' stroke='white' stroke-width='8'/></svg>">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Chakra Petch & Oswald -->
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --val-red: #ff4655;
            --val-dark: #0f1923;
            --val-gray: #ece8e1;
            --val-dark-blue: #1f2326;
        }

        body {
            font-family: 'Chakra Petch', sans-serif; 
            background-color: var(--val-dark);
            color: var(--val-gray);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .font-oswald { font-family: 'Oswald', sans-serif; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--val-dark); }
        ::-webkit-scrollbar-thumb { background: var(--val-red); }

        .val-card {
            background-color: rgba(15, 25, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
        }
        
        .service-radio { display: none; }
        .service-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            height: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .service-label:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }
        .service-radio:checked + .service-label {
            background: rgba(255, 70, 85, 0.1);
            border: 1px solid var(--val-red);
            box-shadow: inset 0 0 15px rgba(255, 70, 85, 0.2);
        }
        
        .gaming-input {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.2s;
            border-radius: 0;
            font-family: 'Chakra Petch', sans-serif;
            letter-spacing: 0.5px;
        }
        .gaming-input:focus {
            border-color: var(--val-red);
            background-color: rgba(0, 0, 0, 0.5);
            outline: none;
            box-shadow: 0 0 0 1px var(--val-red);
        }

        .custom-checkbox { position: relative; overflow: hidden; }
        .tech-border { clip-path: polygon(0 0, 100% 0, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }

        .custom-checkbox input:checked + div {
            border-color: var(--val-red);
            background: linear-gradient(45deg, rgba(255, 70, 85, 0.1), transparent);
        }
        .custom-checkbox input:checked + div .check-icon {
            background-color: var(--val-red);
            border-color: var(--val-red);
        }

        .result-box-container {
            border: 1px solid var(--val-red);
            background: rgba(20, 20, 20, 0.9);
            position: relative;
            overflow: hidden;
        }
        .result-box-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255, 70, 85, 0.05) 51%, transparent 52%);
            background-size: 100% 6px;
            pointer-events: none;
        }

        .rank-Iron { color: #a19d94; font-weight: 700; }
        .rank-Bronze { color: #cd7f32; font-weight: 700; }
        .rank-Silver { color: #e3e3e3; font-weight: 700; }
        .rank-Gold { color: #ffd700; font-weight: 700; }
        .rank-Platinum { color: #3e8f98; font-weight: 700; }
        .rank-Diamond { color: #d946ef; font-weight: 700; }
        .rank-Ascendant { color: #6aeeb5; font-weight: 700; }
        .rank-Immortal { color: #ff4655; font-weight: 700; }

        .deco-sq {
            width: 6px; height: 6px; background: white; opacity: 0.5;
            position: absolute;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-12">

    <div class="fixed top-0 left-0 w-full h-full pointer-events-none z-0">
        <div class="absolute top-10 left-10 w-20 h-1 bg-white opacity-10"></div>
        <div class="absolute bottom-10 right-10 w-20 h-1 bg-white opacity-10"></div>
    </div>

    <div class="val-card max-w-4xl w-full relative z-10 shadow-2xl shadow-black/80 mt-10">
        
        <!-- Header -->
        <div class="p-8 pb-4 text-center border-b border-white/10 relative">
            <h1 class="text-6xl md:text-7xl font-oswald font-bold text-white mb-0 uppercase italic tracking-tighter leading-none relative inline-block">
                JIRO <span class="text-[#ff4655]">BOOSTING</span>
            </h1>
            <div class="flex items-center justify-center gap-4 mt-2">
                <div class="h-[1px] w-12 bg-[#ff4655]"></div>
                <p class="text-lg text-gray-400 tracking-[0.2em] font-medium uppercase">Dịch Vụ Cày Thuê Valorant</p>
                <div class="h-[1px] w-12 bg-[#ff4655]"></div>
            </div>
            <div class="deco-sq top-2 left-2"></div>
            <div class="deco-sq top-2 right-2"></div>
        </div>

        <!-- Main Content -->
        <div class="p-6 md:p-10">
            
            <!-- Service Selection -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-8">
                <div class="h-16">
                    <input type="radio" id="boostRank" name="operationType" value="rank" checked class="service-radio" onchange="toggleOperationFields()">
                    <label for="boostRank" class="service-label hover:skew-x-[-5deg]">
                        <i class="fa-solid fa-trophy mb-1 text-xl"></i>
                        <span class="font-bold text-lg">Cày Rank</span>
                    </label>
                </div>
                <div class="h-16">
                    <input type="radio" id="boostLevel" name="operationType" value="level" class="service-radio" onchange="toggleOperationFields()">
                    <label for="boostLevel" class="service-label hover:skew-x-[-5deg]">
                        <i class="fa-solid fa-layer-group mb-1 text-xl"></i>
                        <span class="font-bold text-lg">Cày Level</span>
                    </label>
                </div>
                <div class="h-16">
                    <input type="radio" id="derank" name="operationType" value="derank" class="service-radio" onchange="toggleOperationFields()">
                    <label for="derank" class="service-label hover:skew-x-[-5deg]">
                        <i class="fa-solid fa-arrow-trend-down mb-1 text-xl"></i>
                        <span class="font-bold text-lg">Derank</span>
                    </label>
                </div>
            </div>

            <!-- Fields Container -->
            <div class="relative">
                <!-- Rank Fields -->
                <div id="rankFields" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="group">
                            <label class="block text-gray-400 text-xl font-bold mb-2 uppercase tracking-wide flex items-center group-hover:text-white">
                                <span class="w-2 h-2 bg-[#ff4655] mr-2 inline-block"></span>
                                Rank Hiện Tại
                            </label>
                            <div class="relative">
                                <select id="currentRank" class="gaming-input w-full p-3 pl-4 text-xl cursor-pointer uppercase appearance-none font-bold"></select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white">
                                    <i class="fa-solid fa-caret-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="group">
                            <label class="block text-gray-400 text-xl font-bold mb-2 uppercase tracking-wide flex items-center group-hover:text-white">
                                <span class="w-2 h-2 bg-[#ff4655] mr-2 inline-block"></span>
                                Rank Mong Muốn
                            </label>
                            <div class="relative">
                                <select id="desiredRank" class="gaming-input w-full p-3 pl-4 text-xl cursor-pointer uppercase appearance-none font-bold"></select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white">
                                    <i class="fa-solid fa-caret-down"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Level Fields -->
                <div id="levelFields" class="hidden space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <label class="block text-gray-400 text-xl font-bold mb-2 uppercase tracking-wide">Level Hiện Tại</label>
                            <input type="number" id="currentLevel" min="1" value="1" class="gaming-input w-full p-3 text-center font-bold text-2xl">
                        </div>
                        <div>
                            <label class="block text-gray-400 text-xl font-bold mb-2 uppercase tracking-wide">Level Mong Muốn</label>
                            <input type="number" id="desiredLevel" min="1" value="1" class="gaming-input w-full p-3 text-center font-bold text-2xl">
                        </div>
                    </div>
                </div>

                <!-- Surcharges -->
                <div id="surchargeOptions" class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <label class="custom-checkbox cursor-pointer group h-full">
                        <input type="checkbox" id="hellElo" class="hidden" onchange="calculatePrice()">
                        <div class="tech-border border border-white/10 p-4 bg-white/5 transition-all group-hover:bg-white/10 h-full flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="check-icon w-5 h-5 border border-gray-500 flex items-center justify-center bg-black/50 transition-colors">
                                    <i class="fa-solid fa-check text-xs text-black"></i>
                                </div>
                                <span class="text-xl font-bold text-gray-300 uppercase">Hell Elo</span>
                            </div>
                            <span class="text-[#ff4655] font-bold text-lg">+10%</span>
                        </div>
                    </label>
                    <label class="custom-checkbox cursor-pointer group h-full">
                        <input type="checkbox" id="fastBoost" class="hidden" onchange="calculatePrice()">
                        <div class="tech-border border border-white/10 p-4 bg-white/5 transition-all group-hover:bg-white/10 h-full flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="check-icon w-5 h-5 border border-gray-500 flex items-center justify-center bg-black/50 transition-colors">
                                    <i class="fa-solid fa-check text-xs text-black"></i>
                                </div>
                                <span class="text-xl font-bold text-gray-300 uppercase">Cày Nhanh</span>
                            </div>
                            <span class="text-[#ff4655] font-bold text-lg">+20%</span>
                        </div>
                    </label>
                    <label class="custom-checkbox cursor-pointer group h-full">
                        <input type="checkbox" id="specificAgent" class="hidden" onchange="calculatePrice()">
                        <div class="tech-border border border-white/10 p-4 bg-white/5 transition-all group-hover:bg-white/10 h-full flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="check-icon w-5 h-5 border border-gray-500 flex items-center justify-center bg-black/50 transition-colors">
                                    <i class="fa-solid fa-check text-xs text-black"></i>
                                </div>
                                <span class="text-xl font-bold text-gray-300 uppercase">Pick Agent</span>
                            </div>
                            <span class="text-[#ff4655] font-bold text-lg">+10%</span>
                        </div>
                    </label>
                </div>

                <!-- Discount Code -->
                <div id="discountCodeContainer" class="mt-8 pt-6 border-t border-white/10">
                    <label class="block text-gray-400 text-lg font-bold mb-2 uppercase tracking-wide">Mã Giảm Giá</label>
                    <div class="relative max-w-md">
                        <input type="text" id="discountCode" placeholder="NHẬP MÃ GIẢM GIÁ..." class="gaming-input w-full p-3 uppercase tracking-widest font-bold text-lg" oninput="this.value = this.value.toUpperCase(); calculatePrice();">
                        <div class="absolute right-4 top-4 text-lg font-bold" id="discountCodeStatus"></div>
                    </div>
                </div>
            </div>

            <!-- Result Area -->
            <div id="result" class="mt-10 min-h-[140px]"></div>

        </div>
        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#ff4655] to-transparent opacity-50"></div>
    </div>

    <script>
        const pricesPerDivision = {
            "Iron": 25000, "Bronze": 30000, "Silver": 40000, "Gold": 55000,
            "Platinum": 80000, "Diamond": 130000, "Ascendant": 180000,
            "Immortal 1": 260000, "Immortal 2": 560000, "Immortal 3": 1400000 
        };

        const DERANK_PRICE_PER_DIVISION = 25000;
        const BASE_LEVEL_1_TO_20_COST = 150000;
        const BASE_LEVEL_RANGE = 19;
        const rankOrder = [
            "Iron 1", "Iron 2", "Iron 3", "Bronze 1", "Bronze 2", "Bronze 3",
            "Silver 1", "Silver 2", "Silver 3", "Gold 1", "Gold 2", "Gold 3",
            "Platinum 1", "Platinum 2", "Platinum 3", "Diamond 1", "Diamond 2", "Diamond 3",
            "Ascendant 1", "Ascendant 2", "Ascendant 3", "Immortal 1", "Immortal 2", "Immortal 3"
        ];
        const discountCodes = { "GIAM5": 0.05, "GIAM10": 0.10, "GIAM15": 0.15 };

        function getRankBaseName(fullRank) { return fullRank.split(' ')[0]; }
        function formatCurrency(amount) { return new Intl.NumberFormat('vi-VN', { style: 'decimal' }).format(Math.round(amount)); }
        function getRankColorClass(rankName) { return `rank-${getRankBaseName(rankName)}`; }

        function populateRankDropdowns() {
            const selects = [document.getElementById('currentRank'), document.getElementById('desiredRank')];
            selects.forEach(select => {
                select.innerHTML = '';
                rankOrder.forEach(rank => {
                    const option = document.createElement('option');
                    option.value = rank;
                    option.textContent = rank;
                    select.appendChild(option);
                });
            });
            selects[0].value = 'Platinum 3';
            selects[1].value = 'Diamond 3';
        }

        function toggleOperationFields() {
            const operation = document.querySelector('input[name="operationType"]:checked').value;
            document.getElementById('rankFields').classList.toggle('hidden', operation !== 'rank' && operation !== 'derank');
            document.getElementById('levelFields').classList.toggle('hidden', operation !== 'level');
            document.getElementById('discountCodeContainer').classList.toggle('hidden', operation === 'derank');
            document.getElementById('surchargeOptions').classList.toggle('hidden', operation !== 'rank');
            calculatePrice();
        }

        function calculatePrice() {
            const operation = document.querySelector('input[name="operationType"]:checked').value;
            const isHellElo = document.getElementById('hellElo').checked;
            const isFastBoost = document.getElementById('fastBoost').checked;
            const isSpecificAgent = document.getElementById('specificAgent').checked;
            const discountCodeInput = document.getElementById('discountCode').value.toUpperCase();
            const resultDiv = document.getElementById('result');
            
            let totalPrice = 0;
            let displayOperation = "";
            let finalPrice = 0;

            if (operation === 'rank' || operation === 'derank') {
                const currentRank = document.getElementById('currentRank').value;
                const desiredRank = document.getElementById('desiredRank').value;
                const cIdx = rankOrder.indexOf(currentRank);
                const dIdx = rankOrder.indexOf(desiredRank);
                const diff = dIdx - cIdx;

                if (diff === 0) {
                    resultDiv.innerHTML = `<div class="p-4 border-l-4 border-yellow-500 bg-yellow-900/20 text-white font-bold">Vui lòng chọn Rank đích khác Rank hiện tại.</div>`;
                    return;
                }

                displayOperation = `<span class="${getRankColorClass(currentRank)}">${currentRank}</span> <i class="fa-solid fa-angles-right mx-4 text-gray-500"></i> <span class="${getRankColorClass(desiredRank)}">${desiredRank}</span>`;

                if (operation === 'rank') {
                    if (diff < 0) {
                        resultDiv.innerHTML = `<div class="p-4 border-l-4 border-red-500 bg-red-900/20 text-white font-bold">Vui lòng chọn Derank nếu muốn hạ bậc.</div>`;
                        return;
                    }
                    for (let i = cIdx; i < dIdx; i++) {
                        const nextRank = rankOrder[i + 1];
                        totalPrice += (pricesPerDivision[nextRank] || pricesPerDivision[getRankBaseName(nextRank)]);
                    }
                } else {
                    if (diff > 0) {
                        resultDiv.innerHTML = `<div class="p-4 border-l-4 border-red-500 bg-red-900/20 text-white font-bold">Vui lòng chọn Cày Rank nếu muốn lên bậc.</div>`;
                        return;
                    }
                    totalPrice = Math.abs(diff) * DERANK_PRICE_PER_DIVISION;
                }
            } else if (operation === 'level') {
                const cL = parseInt(document.getElementById('currentLevel').value);
                const dL = parseInt(document.getElementById('desiredLevel').value);
                if (dL <= cL) {
                    resultDiv.innerHTML = `<div class="p-4 border-l-4 border-red-500 bg-red-900/20 text-white font-bold">Level đích phải lớn hơn hiện tại.</div>`;
                    return;
                }
                displayOperation = `CÀY LEVEL: ${cL} <i class="fa-solid fa-arrow-right mx-2 opacity-50"></i> ${dL}`;
                totalPrice = ((dL - cL) / BASE_LEVEL_RANGE) * BASE_LEVEL_1_TO_20_COST;
            }

            // Phụ phí
            finalPrice = totalPrice;
            if (operation === 'rank') {
                if (isHellElo) finalPrice += totalPrice * 0.1;
                if (isFastBoost) finalPrice += totalPrice * 0.2;
                if (isSpecificAgent) finalPrice += totalPrice * 0.1;
            }

            // Giảm giá
            const status = document.getElementById('discountCodeStatus');
            if (discountCodeInput && operation !== 'derank') {
                if (discountCodes[discountCodeInput]) {
                    const rate = discountCodes[discountCodeInput];
                    finalPrice -= (finalPrice * rate);
                    status.innerHTML = `<span class="text-green-500">-${rate*100}%</span>`;
                } else {
                    status.innerHTML = `<span class="text-red-500">SAI MÃ</span>`;
                }
            } else { status.innerHTML = ''; }

            if (totalPrice > 0) {
                resultDiv.innerHTML = `
                    <div class="result-box-container p-8">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                            <div class="text-2xl md:text-3xl font-oswald uppercase tracking-wider text-center md:text-left">
                                ${displayOperation}
                            </div>
                            <div class="text-center md:text-right">
                                <p class="text-gray-500 uppercase font-bold text-sm tracking-widest mb-1">Tổng chi phí dự kiến</p>
                                <div class="text-6xl font-oswald font-bold text-white leading-none">
                                    ${formatCurrency(finalPrice)}<span class="text-2xl text-[#ff4655] align-top ml-1">đ</span>
                                </div>
                            </div>
                        </div>

                        <!-- Nút Thuê Ngay mới -->
                        <a href="https://www.facebook.com/jirovlr" target="_blank" 
                           class="block w-full py-4 bg-[#ff4655] hover:bg-[#ff5d6a] text-white text-center font-bold text-2xl uppercase tracking-widest transition-all transform hover:scale-[1.01] active:scale-95 relative overflow-hidden group">
                            <span class="relative z-10 flex items-center justify-center gap-3">
                                THUÊ NGAY 
                            </span>
                            <div class="absolute inset-0 bg-white/10 translate-x-[-100%] group-hover:translate-x-0 transition-transform duration-300"></div>
                        </a>
                        <p class="text-center text-gray-500 text-xs mt-3 uppercase tracking-widest opacity-50 italic">* Nhấn thuê ngay để có thể trao đổi trực tiếp với admin</p>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = '<div class="h-full flex items-center justify-center text-gray-600 italic py-8">Waiting for configuration...</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateRankDropdowns();
            toggleOperationFields();
            ['currentRank', 'desiredRank', 'currentLevel', 'desiredLevel'].forEach(id => {
                document.getElementById(id).addEventListener('change', calculatePrice);
                document.getElementById(id).addEventListener('input', calculatePrice);
            });
        });
    </script>
</body>
</html>
